; ============================================================================
; HeartSim - Haptic Heart Auscultation Simulator
; KU Leuven Master's Project - Joppe Baert & Tijs Beerten
; ============================================================================

[env:arduino_nano_esp32]
platform      = espressif32@^6.5.0
board         = arduino_nano_esp32
framework     = arduino

; Filesystem for LittleFS (web interface assets)
board_build.filesystem = littlefs

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

; ============================================================================
; UPLOAD — via UART/esptool over COM port
; (DFU does not work on this setup — use esptool instead.)
; If the COM port changes: adjust COM8 to what appears in Device Manager.
; ============================================================================
upload_protocol = esptool
upload_port     = COM8
upload_speed    = 921600

; ============================================================================
; LIBRARIES
; ============================================================================
lib_deps =
    ; Web server (async, non-blocking)
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.2

    ; JSON parsing for REST API
    bblanchon/ArduinoJson @ ^7.2.0

    ; LittleFS is built into the ESP32 Arduino core, no separate library needed

; ============================================================================
; BUILD FLAGS
; ============================================================================
build_flags =
    -D CORE_DEBUG_LEVEL=3                ; 0=none, 3=INFO, 5=VERBOSE
    -D ARDUINO_USB_CDC_ON_BOOT=1         ; Serial via USB CDC
    -D CONFIG_ASYNC_TCP_USE_WDT=0        ; AsyncTCP watchdog off (prevents crashes)
    -D BOARD_HAS_PSRAM                   ; Nano ESP32 has no PSRAM, but safe to define
    -O2                                  ; Optimise for speed (DSP code!)

; ============================================================================
; PARTITION SCHEME
; Default partition is too small for LittleFS + our code.
; "huge_app.csv" gives 3 MB app + 1 MB SPIFFS — use that.
; ============================================================================
board_build.partitions = huge_app.csv

; ============================================================================
; CUSTOM TARGETS
; ============================================================================
; Upload code:          pio run -t upload
; Upload filesystem:    pio run -t uploadfs
; Monitor:              pio device monitor
;
; Later (after first successful flash) you can switch to OTA over WiFi:
;   pio run -t upload --upload-port heartsim.local --upload-flags "--auth=heartsim2026"
